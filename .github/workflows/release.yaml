name: Release

env:
  DEBUG: napi:*
  APP_NAME: sipat
  MACOSX_DEPLOYMENT_TARGET: '10.13'
  CARGO_INCREMENTAL: '1'

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - LICENSE
      - '**/*.gitignore'
      - .editorconfig
      - docs/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Release gate
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
      dist_tag: ${{ steps.gate.outputs.dist_tag }}
      version: ${{ steps.gate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Decide release
        id: gate
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          SHOULD_RELEASE='false'
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            SHOULD_RELEASE='true'
          elif [[ "$COMMIT_MSG" == chore\(release\):\ bump* ]]; then
            SHOULD_RELEASE='true'
          fi

          DIST_TAG='latest'
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG='next'
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$SHOULD_RELEASE" = 'true' ]; then
            echo "Release enabled for version $VERSION with dist-tag $DIST_TAG"
          else
            echo "Skipping release: commit message does not match 'chore(release): bump ...'"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs:
      - gate
    if: needs.gate.outputs.should_release == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Oxlint
        run: bun run lint
      - name: Cargo fmt
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy

  build:
    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    needs:
      - gate
    if: needs.gate.outputs.should_release == 'true'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-15-intel
            target: x86_64-apple-darwin
            build: bun run build -- --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: bun run build -- --target aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: bun run build -- --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: bun run build -- --target x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            ${{ env.APP_NAME }}.*.node
            ${{ env.APP_NAME }}.*.wasm
          if-no-files-found: error

  test-bindings:
    name: Test ${{ matrix.target }} on node@${{ matrix.node }}
    needs:
      - gate
      - build
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ${{ matrix.host }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-15-intel
            target: x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
        node:
          - '20'
          - '22'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: .
      - name: Test bindings
        run: bun run test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs:
      - gate
      - lint
      - test-bindings
    if: needs.gate.outputs.should_release == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Create npm dirs
        run: bunx napi create-npm-dirs
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Move artifacts
        run: bunx napi artifacts
      - name: Check if version already exists
        id: check_version
        run: |
          VERSION='${{ needs.gate.outputs.version }}'
          if npm view "${APP_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo 'already_published=true' >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is already published, skipping"
          else
            echo 'already_published=false' >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.check_version.outputs.already_published != 'true'
        run: npm publish --provenance --tag ${{ needs.gate.outputs.dist_tag }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
